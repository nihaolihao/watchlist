{# 主页模板 #}
{% extends 'base.html' %}

{% block content %}
{# 使用length 过滤器获取电影列表长度 #}
<p>{{ movies|length }} Titiles</p>
<form method="post">
    Name <input type="text" name="title" autocapitalize="off" required>
    Year <input type="text" name="year" autocapitalize="off" required>
    <input class="btn" type="submit" value="Add">
</form>
<ul class="movie-list">
    {% for movie in movies %}
    {# 迭代movies 变量 #}
    <li>{{ movie.title }} -- {{ movie.year }}
    {# 等同于movie['title'] #}
    <span class="float-right">
        <a href="{{ url_for('edit', movie_id=movie.id) }}" class="btn">Edit</a>
        <form class="inline-form" method="post" action="{{ url_for('delete', movie_id=movie.id) }}">
        <input class="btn" type="submit" name="delete" value="Delete" onclick="return confirm('Are you sure?')"> 
        </form>
        <a href="https://www.imdb.com/find?q={{ movie.title }}" target="_blank" title="Find this movie on IMDB" class="imdb">IMDB</a>
    </span>
</li>
    {% endfor %}
    </ul>
    
{% endblock %}
