{# 主页模板 #}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>{{ name }}'s Watchlist</title>
    </head>
    <body>
        <h2>{{ name }}'s Watchlist</h2>
        {# 使用length 过滤器获取电影列表长度 #}
        <p>{{ movies|length }} Titiles</p>
        <ul>
            {% for movie in movies %}
            {# 迭代movies 变量 #}
            <li>{{ movie.title }} -- {{ movie.year }}</li>
            {# 等同于movie['title'] #}
            {% endfor %}
        </ul>
        <footer>
            <small>&copy; 2018<a href="https://github.com/lihaoabc/watchlist">
                HelloFlask
            </a></small>
        </footer>
    </body>
</html>
