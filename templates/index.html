{# 主页模板 #}
{% extends 'base.html' %}

{% block content %}
{# 使用length 过滤器获取电影列表长度 #}
<p>{{ movies|length }} Titiles</p>
<ul class="movie-list">
    {% for movie in movies %}
    {# 迭代movies 变量 #}
    <li>{{ movie.title }} -- {{ movie.year }}
    {# 等同于movie['title'] #}
    <span class="float-right">
        <a href="https://www.imdb.com/find?q={{ movie.title }}" target="_blank" title="Find this movie on IMDB" class="imdb">IMDB</a>
    </span>
</li>
    {% endfor %}
    </ul>
    
{% endblock %}
